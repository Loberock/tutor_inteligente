spring.application.name=TutorInteligente

spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=DB_TutorInteligente;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=${JWT_SECRET:dev-only-secret-key-change-before-production-1234567890}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
